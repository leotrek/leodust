site_name: LeoDust
site_description: LeoDust simulator documentation
repo_url: https://github.com/leotrek/leodust
docs_dir: docs
theme:
  name: readthedocs
markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - attr_list
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Tutorials:
      - Overview: tutorials/index.md
      - First Simulation: tutorials/first-simulation.md
      - Runtime Assembly: tutorials/runtime-assembly.md
      - Precompute and Replay: tutorials/precompute-and-replay.md
      - Viewer and GitHub Pages: tutorials/viewer-and-github-pages.md
      - Changing Configurations: tutorials/changing-configurations.md
  - Concepts:
      - Simulation Model: concepts/simulation-model.md
      - Orbit, Links, and Routing: concepts/orbit-links-routing.md
  - Reference:
      - CLI: reference/cli.md
      - Plugins: reference/plugins.md
      - Runtime Integration: reference/runtime-integration.md
      - Configuration: reference/configuration.md
      - Bundled Presets: reference/bundled-presets.md
      - Data Files: reference/data-files.md
      - Computing and Deployment: reference/computing-and-deployment.md
      - Runtime Components: reference/runtime-components.md
      - Package and Type Map: reference/package-type-map.md
